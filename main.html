<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataVerse | Advanced Intelligence Hub</title>
    
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/scrollreveal"></script>

    <style>
        :root {
            /* Dark Mode Palette - Deep Obsidian */
            --bg: #050505;
            --card-bg: rgba(15, 15, 15, 0.7);
            --card-hover: rgba(25, 25, 25, 0.8);
            --border: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.15);
            --text-main: #ffffff;
            --text-dim: #9ca3af;
            --accent: #ffffff;
            --accent-glow: rgba(255, 255, 255, 0.1);
            --glass-blur: 15px;
            --nav-bg: rgba(5, 5, 5, 0.8);
        }

        [data-bs-theme="light"] {
            /* Light Mode Palette - Arctic Frost */
            --bg: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.8);
            --card-hover: rgba(255, 255, 255, 1);
            --border: rgba(0, 0, 0, 0.05);
            --border-hover: rgba(0, 0, 0, 0.1);
            --text-main: #0f172a;
            --text-dim: #64748b;
            --accent: #0f172a;
            --accent-glow: rgba(0, 0, 0, 0.05);
            --nav-bg: rgba(248, 250, 252, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            transition: background-color 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-x: hidden;
            line-height: 1.6;
        }

        h1, h2, h3, h4, .navbar-brand {
            font-family: 'Outfit', sans-serif;
        }

        /* --- Noise Overlay --- */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url("https://grainy-gradients.vercel.app/noise.svg");
            opacity: 0.02;
            pointer-events: none;
            z-index: 9999;
        }

        /* --- Custom Scrollbar --- */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

        /* --- Navigation --- */
        .navbar {
            padding: 1.5rem 0;
            background-color: var(--nav-bg);
            backdrop-filter: blur(var(--glass-blur));
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .navbar.scrolled {
            padding: 1rem 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: -1.5px;
            color: var(--text-main) !important;
            transition: transform 0.3s ease;
        }

        .navbar-brand:hover { transform: translateY(-1px); }

        .theme-toggle {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            color: var(--text-main);
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .theme-toggle:hover {
            background: var(--card-hover);
            border-color: var(--border-hover);
            transform: scale(1.05);
        }

        .theme-toggle i { font-size: 1.1rem; }

        /* --- Hero Section --- */
        .hero {
            padding: clamp(80px, 15vh, 160px) 0 80px 0;
            text-align: left;
        }

        .hero-label {
            display: inline-flex;
            align-items: center;
            padding: 6px 12px;
            background: var(--accent-glow);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            color: var(--text-dim);
            margin-bottom: 2rem;
            text-transform: uppercase;
        }

        .hero h1 {
            font-weight: 700;
            font-size: clamp(2.8rem, 8vw, 5.5rem);
            line-height: 0.95;
            letter-spacing: -3.5px;
            margin-bottom: 2rem;
            max-width: 900px;
        }

        .hero h1 span {
            color: var(--text-dim);
            font-weight: 300;
        }

        /* --- Grid System --- */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-bottom: 120px;
        }

        /* --- Project Cards --- */
        .project-card {
            background-color: var(--card-bg);
            backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--border);
            padding: 45px;
            border-radius: 24px;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .project-card::after {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at top right, var(--accent-glow), transparent 70%);
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .project-card:hover {
            transform: translateY(-8px);
            background-color: var(--card-hover);
            border-color: var(--border-hover);
            box-shadow: 0 30px 60px rgba(0,0,0,0.15);
        }

        .project-card:hover::after { opacity: 1; }

        .card-num {
            font-size: 0.8rem;
            font-weight: 700;
            font-family: 'Outfit';
            color: var(--text-dim);
            margin-bottom: 2.5rem;
            display: block;
            opacity: 0.5;
        }

        .card-icon {
            width: 52px;
            height: 52px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.8rem;
            transition: all 0.3s ease;
            position: relative;
            z-index: 1;
        }

        .project-card:hover .card-icon {
            transform: rotate(-5deg) scale(1.1);
            border-color: var(--text-main);
            color: var(--text-main);
        }

        .card-icon i { font-size: 1.4rem; color: var(--text-dim); }
        .project-card:hover .card-icon i { color: var(--text-main); }

        .project-card h3 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 1rem;
            letter-spacing: -0.5px;
            position: relative;
            z-index: 1;
        }

        .project-card p {
            font-size: 0.95rem;
            color: var(--text-dim);
            line-height: 1.6;
            margin: 0;
            position: relative;
            z-index: 1;
        }

        /* --- Modal Styling --- */
        .modal-content {
            background-color: var(--bg);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 40px;
            overflow: hidden;
            box-shadow: 0 50px 100px rgba(0,0,0,0.5);
        }

        .modal-header {
            border: none;
            padding: 0 0 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-body { padding: 0; }

        .modal-num {
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--text-dim);
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .modal-title {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -1.5px;
            margin-bottom: 1.5rem;
        }

        .modal-desc {
            color: var(--text-dim);
            font-size: 1.05rem;
            line-height: 1.8;
            margin-bottom: 2.5rem;
            font-weight: 300;
        }

        .skill-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 3rem;
        }

        .skill-badge {
            background: var(--accent-glow);
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-main);
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .skill-badge:hover {
            border-color: var(--text-main);
            transform: translateY(-2px);
        }

        .btn-launch {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 20px;
            border-radius: 18px;
            font-size: 1rem;
            font-weight: 700;
            width: 100%;
            text-decoration: none;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .btn-launch:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
            color: var(--bg);
            box-shadow: 0 15px 30px rgba(255,255,255,0.1);
        }

        .btn-close {
            background-color: var(--border);
            opacity: 1;
            padding: 1rem;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .btn-close:hover { transform: rotate(90deg); background-color: var(--border-hover); }

        /* --- Footer --- */
        .footer-profile {
            border-top: 1px solid var(--border);
            padding: 100px 0;
            margin-top: 60px;
        }

        .profile-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 30px;
            border-radius: 24px;
            display: inline-flex;
            align-items: center;
            gap: 24px;
            transition: all 0.3s ease;
        }

        .profile-card:hover { border-color: var(--text-main); }

        .profile-img {
            width: 72px;
            height: 72px;
            border-radius: 18px;
            object-fit: cover;
            filter: grayscale(0.5);
            transition: filter 0.3s ease;
            background: #222;
        }

        .profile-card:hover .profile-img { filter: grayscale(0); }

        .profile-info h4 { font-size: 1.1rem; font-weight: 700; margin: 0; }
        .profile-info p { font-size: 0.85rem; color: var(--text-dim); margin: 2px 0 10px 0; }
        
        .follow-link {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-main);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .follow-link:hover i { transform: translateX(4px); }
        .follow-link i { transition: transform 0.3s ease; }

        /* --- Responsive Tweaks --- */
        @media (max-width: 1200px) {
            .grid-container { grid-template-columns: repeat(2, 1fr); gap: 20px; }
        }

        @media (max-width: 768px) {
            .hero { padding: 100px 0 60px 0; }
            .hero h1 { letter-spacing: -2px; }
            .grid-container { grid-template-columns: 1fr; gap: 16px; }
            .project-card { padding: 35px; }
            .modal-content { padding: 30px; border-radius: 24px; }
            .modal-title { font-size: 1.8rem; }
            .profile-card { width: 100%; justify-content: flex-start; }
        }

        /* --- Animations --- */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .hero h1 span {
            display: inline-block;
            animation: float 6s ease-in-out infinite;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand" id="mainNav">
        <div class="container">
            <a class="navbar-brand" href="#">DATAVERSE</a>
            <div class="ms-auto d-flex align-items-center gap-3">
                <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">
                    <i class="fa-solid fa-moon"></i>
                </button>
            </div>
        </div>
    </nav>

    <header class="hero container">
        <div class="hero-label">Intelligence Hub • Edition 2026</div>
        <h1>Sophisticated tools <br><span>for raw data.</span></h1>
    </header>

    <main class="container">
        <div class="grid-container" id="project-grid">
            <!-- Projects injected by JS -->
        </div>
    </main>

    <!-- Modal -->
    <div class="modal fade" id="projectModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <span id="modal-num" class="modal-num"></span>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close" id="modal-close-btn"></button>
                </div>
                <div class="modal-body">
                    <h2 id="modal-title" class="modal-title"></h2>
                    <p id="modal-desc" class="modal-desc"></p>
                    
                    <h6 class="modal-num mb-3">Core Stack</h6>
                    <div id="modal-skills" class="skill-container"></div>
                    
                    <a href="#" id="modal-link" target="_blank" class="btn-launch">
                        LAUNCH APPLICATION <i class="fa-solid fa-arrow-up-right-from-square"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <footer class="container footer-profile">
        <div class="profile-card">
            <img src="./imgsss/m.png" class="profile-img" alt="Ghanshyamsinh Zala">
            <div class="profile-info">
                <h4>Ghanshyamsinh Zala</h4>
                <p>Developer & ML Researcher</p>
                <a href="https://linktr.ee/ghza3006" target="_blank" class="follow-link">
                    Connect on Linktree <i class="fa-solid fa-arrow-right"></i>
                </a>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const projects = [
            { 
                id: "01", icon: "fa-layer-group", title: "Market Analysis", 
                short: "Rule mining and semantic grouping for transactional datasets.",
                desc: "A suite for interactive Market-Basket mining. Supports Apriori and FP-Growth algorithms with automated parameter suggestion and LLM-powered business explanations. Optimized for retail insight discovery.",
                skills: ["Python", "MLxtend", "OpenAI API", "Plotly"],
                link: "https://dataverseasociationrules.streamlit.app/"
            },
            { 
                id: "02", icon: "fa-chart-simple", title: "Binning Tool", 
                short: "Optimization of numerical distribution via KL Divergence.",
                desc: "An advanced data discretization tool. Uses KL-Divergence elbow detection and K-Means binning to find optimal numerical boundaries for machine learning features. Reduces noise in complex datasets.",
                skills: ["Scikit-Learn", "SciPy", "Matplotlib", "Statistics"],
                link: "https://dataverse-binning.streamlit.app/"
            },
            { 
                id: "03", icon: "fa-wand-sparkles", title: "Data Cleaning", 
                short: "LLM-augmented anomaly detection and PII masking.",
                desc: "Intelligent data assistant featuring KNN imputation, PII pseudonymization, and LLM-augmented cleaning logs to ensure data quality and privacy compliance. A must-have for data preparation.",
                skills: ["Pandas", "Faker", "KNN Imputer", "Data Privacy"],
                link: "https://dataverse-cleaningastnt.streamlit.app/"
            },
            { 
                id: "04", icon: "fa-circle-nodes", title: "Clustering", 
                short: "High-dimensional data grouping and stability testing.",
                desc: "Exploratory clustering module that evaluates model stability across multiple seeds and visualizes high-dimensional spaces using UMAP and t-SNE. Includes silhouette analysis for cluster optimization.",
                skills: ["K-Means", "UMAP", "Silhouette Score", "t-SNE"],
                link: "https://dataverse-cluster.streamlit.app/"
            },
            { 
                id: "05", icon: "fa-tree", title: "Decision Tree", 
                short: "Explainable AI through SHAP and counterfactuals.",
                desc: "Transparent ML explorer. Provides SHAP summary plots, heuristic counterfactual generation, and distillation of complex models into human-readable business rules. Bridging the gap between code and logic.",
                skills: ["SHAP", "Decision Trees", "XGBoost", "Explainable AI"],
                link: "https://dataverse-decisiontree.streamlit.app/"
            },
            { 
                id: "06", icon: "fa-clapperboard", title: "Recommender", 
                short: "Vector similarity engine for content discovery.",
                desc: "Content-based recommendation engine using TF-IDF vectorization. Features session tracking, personalized history, and cold-start popularity scoring. Delivers a Netflix-like discovery experience.",
                skills: ["NLP", "Cosine Similarity", "TF-IDF", "Streamlit"],
                link: "https://dataverse-movierec.streamlit.app/"
            },
            { 
                id: "07", icon: "fa-wave-square", title: "Music Analyzer", 
                short: "MFCC extraction and genre classification from audio.",
                desc: "Signal processing tool that extracts MFCC and spectral features from raw audio to classify genres and generate similarity-based network graphs. Perfect for audio data research.",
                skills: ["Librosa", "Audio Processing", "NetworkX", "Joblib"],
                link: "https://dataverse-musicclassifier.streamlit.app/"
            },
            { 
                id: "08", icon: "fa-message", title: "Sentiment", 
                short: "Ensemble models for aspect-based text extraction.",
                desc: "NLP analyzer that utilizes an ensemble approach for sentiment scoring. Includes aspect-based extraction and emotional lexicon mapping to visualize user emotions in real-time.",
                skills: ["TextBlob", "VADER", "NLTK", "WordCloud"],
                link: "https://dataverse-senanalysis.streamlit.app/"
            },
            { 
                id: "09", icon: "fa-arrow-trend-up", title: "Stock Alpha", 
                short: "Technical patterns and volatility forecasting.",
                desc: "Quantitative finance tool. Detects technical patterns like Golden Crosses and Double Tops, while calculating risk metrics like VaR and the Sharpe Ratio. High-precision market signals.",
                skills: ["yFinance", "Pandas-TA", "Risk Analysis", "Forecasting"],
                link: "https://dataverse-stockanalysis.streamlit.app/"
            }
        ];

        const grid = document.getElementById('project-grid');
        const modalElement = document.getElementById('projectModal');
        const modal = new bootstrap.Modal(modalElement);
        const nav = document.getElementById('mainNav');

        // Scroll logic for navbar
        window.onscroll = function() {
            if (document.body.scrollTop > 50 || document.documentElement.scrollTop > 50) {
                nav.classList.add("scrolled");
            } else {
                nav.classList.remove("scrolled");
            }
        };

        // Inject cards
        projects.forEach((p, idx) => {
            const el = document.createElement('div');
            el.className = 'project-card';
            el.innerHTML = `
                <span class="card-num">${p.id}</span>
                <div class="card-icon"><i class="fa-solid ${p.icon}"></i></div>
                <h3>${p.title}</h3>
                <p>${p.short}</p>
            `;
            el.onclick = () => showProject(idx);
            grid.appendChild(el);
        });

        function showProject(index) {
            const p = projects[index];
            document.getElementById('modal-num').innerText = `Instance 0x${p.id}`;
            document.getElementById('modal-title').innerText = p.title;
            document.getElementById('modal-desc').innerText = p.desc;
            document.getElementById('modal-link').href = p.link;
            
            const skillsContainer = document.getElementById('modal-skills');
            skillsContainer.innerHTML = p.skills.map(s => `<span class="skill-badge">${s}</span>`).join('');
            
            modal.show();
        }

        function toggleTheme() {
            const html = document.documentElement;
            const btn = document.getElementById('theme-btn');
            const isDark = html.getAttribute('data-bs-theme') === 'dark';
            
            html.setAttribute('data-bs-theme', isDark ? 'light' : 'dark');
            btn.innerHTML = isDark ? '<i class="fa-solid fa-sun"></i>' : '<i class="fa-solid fa-moon"></i>';
            
            const closeBtn = document.getElementById('modal-close-btn');
            closeBtn.classList.toggle('btn-close-white', !isDark);
        }

        // Initialize ScrollReveal
        ScrollReveal().reveal('.project-card', { 
            delay: 200, 
            distance: '30px', 
            interval: 80, 
            origin: 'bottom', 
            duration: 1200,
            easing: 'cubic-bezier(0.5, 0, 0, 1)'
        });

        ScrollReveal().reveal('.hero h1', { delay: 100, distance: '20px', origin: 'left' });
        ScrollReveal().reveal('.hero-label', { delay: 50, distance: '10px', origin: 'top' });
    </script>
</body>
</html>
